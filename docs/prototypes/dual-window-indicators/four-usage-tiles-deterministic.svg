<svg xmlns="http://www.w3.org/2000/svg" width="1254" height="1254" viewBox="0 0 1254 1254">
  <style>
    .tile { fill: #090d13; stroke: #343a46; stroke-width: 2; }
    .header { fill: #f8fafc; font: 700 48px system-ui, sans-serif; text-anchor: middle; }
    .percent { font: 700 92px system-ui, sans-serif; text-anchor: middle; }
    .detail { fill: #f8fafc; font: 700 42px system-ui, sans-serif; text-anchor: middle; }
    .delta { font: 700 35px system-ui, sans-serif; text-anchor: middle; }
    .track { fill: none; stroke: #303640; stroke-width: 20; }
    .progress { fill: none; stroke-width: 20; stroke-linecap: round; transform: rotate(-90deg); transform-origin: 285px 270px; }
  </style>

  <!-- Claude Code 5h: exact LobeHub dark icon centered at (285, 285). -->
  <g transform="translate(36 36)">
    <rect class="tile" width="570" height="570" rx="28"/>
    <image href="provider-icons/claudecode-dark.png" x="105" y="105" width="360" height="360" opacity="0.15" preserveAspectRatio="xMidYMid meet"/>
    <text class="header" x="285" y="76">Claude 5h</text>
    <circle class="track" cx="285" cy="270" r="140"/>
    <circle class="progress" cx="285" cy="270" r="140" stroke="#fb6b52" stroke-dasharray="545 335"/>
    <text class="percent" x="285" y="302" fill="#fb6b52">62%</text>
    <text class="detail" x="170" y="500">⟳ 3h</text>
    <text class="delta" x="404" y="500" fill="#fb6b52">Δ −22pp</text>
  </g>

  <!-- Codex 5h: exact LobeHub dark icon centered at (285, 285). -->
  <g transform="translate(648 36)">
    <rect class="tile" width="570" height="570" rx="28"/>
    <image href="provider-icons/codex-dark.png" x="105" y="105" width="360" height="360" opacity="0.12" preserveAspectRatio="xMidYMid meet"/>
    <text class="header" x="285" y="76">Codex 5h</text>
    <circle class="track" cx="285" cy="270" r="140"/>
    <circle class="progress" cx="285" cy="270" r="140" stroke="#4ade80" stroke-dasharray="88 792"/>
    <text class="percent" x="285" y="302" fill="#4ade80">10%</text>
    <text class="detail" x="170" y="500">⟳ 4h</text>
    <text class="delta" x="404" y="500" fill="#4ade80">Δ +10pp</text>
  </g>

  <!-- Claude Code 7d: exact LobeHub dark icon centered at (285, 285). -->
  <g transform="translate(36 648)">
    <rect class="tile" width="570" height="570" rx="28"/>
    <image href="provider-icons/claudecode-dark.png" x="105" y="105" width="360" height="360" opacity="0.15" preserveAspectRatio="xMidYMid meet"/>
    <text class="header" x="285" y="76">Claude 7d</text>
    <circle class="track" cx="285" cy="270" r="140"/>
    <circle class="progress" cx="285" cy="270" r="140" stroke="#f59e0b" stroke-dasharray="273 607"/>
    <text class="percent" x="285" y="302" fill="#f59e0b">31%</text>
    <text class="detail" x="170" y="500">⟳ 5d</text>
    <text class="delta" x="404" y="500" fill="#f59e0b">Δ −2pp</text>
  </g>

  <!-- Codex 7d: exact LobeHub dark icon centered at (285, 285). -->
  <g transform="translate(648 648)">
    <rect class="tile" width="570" height="570" rx="28"/>
    <image href="provider-icons/codex-dark.png" x="105" y="105" width="360" height="360" opacity="0.12" preserveAspectRatio="xMidYMid meet"/>
    <text class="header" x="285" y="76">Codex 7d</text>
    <circle class="track" cx="285" cy="270" r="140"/>
    <circle class="progress" cx="285" cy="270" r="140" stroke="#4ade80" stroke-dasharray="396 484"/>
    <text class="percent" x="285" y="302" fill="#4ade80">45%</text>
    <text class="detail" x="170" y="500">⟳ 3d</text>
    <text class="delta" x="404" y="500" fill="#4ade80">Δ +12pp</text>
  </g>
</svg>
